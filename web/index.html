<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bark-Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div id="header-row-1">
            <h1>BARK-BUDDY</h1>
            <span class="stat"><span class="stat-label">Mode</span> <span id="mode-val">remote</span></span>
            <span class="stat batt-clickable" id="batt-stat"><span class="stat-label">Batt</span> <span id="battery-val">--</span></span>
            <span class="stat"><span class="stat-label">Bal</span> <span id="balance-val" class="off">OFF</span></span>
            <div id="header-right">
                <div id="transport-wrapper">
                    <span id="transport-badge" class="transport-badge sim">SIM</span>
                    <div id="transport-menu" class="transport-menu hidden">
                        <button data-transport="usb">USB</button>
                        <button data-transport="wifi">WiFi</button>
                        <button data-transport="wifi-setup">Setup WiFi...</button>
                        <button data-transport="sim+">Sim+</button>
                        <button data-transport="sim">Sim (classic)</button>
                    </div>
                </div>
                <button id="btn-lock" class="header-btn">Take Control</button>
                <span id="lock-text"></span>
                <span id="conn-indicator" class="indicator disconnected"></span>
                <span id="conn-text">Offline</span>
            </div>
        </div>
    </header>

    <div id="batt-popup" class="popup hidden">
        <div class="popup-header">
            <span>Battery</span>
            <button id="batt-popup-close" class="popup-close">&times;</button>
        </div>
        <canvas id="batt-canvas" width="300" height="120"></canvas>
    </div>

    <div id="wifi-banner" class="hidden">
        <span id="wifi-banner-text">WiFi detected</span>
        <button id="wifi-banner-switch">Switch to WiFi</button>
        <button class="dismiss" id="wifi-banner-dismiss">&#10005;</button>
    </div>
    <div id="fall-alert" class="hidden">FALL DETECTED</div>

    <div id="main">
        <div id="panel-left">
            <div id="dog-view-section" class="view-box">
                <span class="view-label">3D View <button id="btn-overlay" class="overlay-toggle" title="Kinematics overlay">K</button></span>
                <div id="dog-3d-container"></div>
                <div id="telem-overlay">
                    <span><span class="stat-label">Hdg</span> <span id="heading-val">0&deg;</span></span>
                    <span><span class="stat-label">Pitch</span> <span id="pitch-val">0.0</span></span>
                    <span><span class="stat-label">Roll</span> <span id="roll-val">0.0</span></span>
                    <span><span class="stat-label">Dist</span> <span id="ultra-val">--</span></span>
                </div>
            </div>
            <div id="scan-section" class="view-box">
                <span class="view-label">Scan Map</span>
                <div id="scan-progress" class="hidden">
                    <div class="progress-bar"><div id="scan-progress-fill" class="progress-fill"></div></div>
                    <span id="scan-progress-text">0%</span>
                </div>
                <canvas id="map-canvas"></canvas>
                <div id="map-info">
                    <span id="map-points">0 pts</span>
                    <span id="map-scans">0 scans</span>
                </div>
            </div>
        </div>

        <div id="panel-right">
            <div class="ctrl-section">
                <h2>Movement</h2>
                <div class="dpad-wrapper">
                    <div class="dpad">
                        <button class="dpad-btn" id="btn-forward" data-dir="forward">&#9650;</button>
                        <div class="dpad-row">
                            <button class="dpad-btn" id="btn-left" data-dir="left">&#9664;</button>
                            <button class="dpad-btn dpad-center" id="btn-stop" data-dir="stop">&#9632;</button>
                            <button class="dpad-btn" id="btn-right" data-dir="right">&#9654;</button>
                        </div>
                        <button class="dpad-btn" id="btn-backward" data-dir="backward">&#9660;</button>
                    </div>
                </div>
                <div id="motion-state" class="motion-indicator"></div>
            </div>

            <div class="ctrl-section">
                <h2>Actions</h2>
                <div class="action-bar">
                    <button class="action-btn" data-action="stand">Stand</button>
                    <button class="action-btn" id="btn-balance" data-action="balance-toggle">Balance: OFF</button>
                    <button class="action-btn" data-action="wave">Wave</button>
                    <button class="action-btn" data-action="sit">Sit</button>
                    <button class="action-btn" data-action="lie">Lie Down</button>
                </div>
            </div>

            <div class="ctrl-section">
                <h2>Operations</h2>
                <div class="action-bar">
                    <button class="action-btn" id="btn-patrol-demo">Patrol Demo</button>
                    <button class="action-btn" id="btn-patrol-stop" disabled>Stop Patrol</button>
                    <button class="action-btn" id="btn-scan-start">Scan Area</button>
                    <button class="action-btn" id="btn-scan-stop" disabled>Stop Scan</button>
                    <button class="action-btn" id="btn-map-clear">Clear Map</button>
                    <button class="action-btn" id="btn-reset">Reset</button>
                </div>
                <div id="patrol-status" class="hidden">
                    <span id="patrol-pos"></span>
                    <span id="patrol-wp"></span>
                </div>
            </div>

            <div id="sim-panel" class="ctrl-section hidden">
                <h2>Sim Noise</h2>
                <div class="noise-grid">
                    <label>Pkt Drop <span id="val-drop">0</span>%</label>
                    <input type="range" min="0" max="50" value="0" data-noise="packet_drop_pct">
                    <label>Latency <span id="val-lat">0</span>ms</label>
                    <input type="range" min="0" max="500" step="10" value="0" data-noise="latency_base_ms">
                    <label>Jitter <span id="val-jit">0</span>ms</label>
                    <input type="range" min="0" max="200" step="5" value="0" data-noise="latency_jitter_ms">
                    <label>Sonar &sigma; <span id="val-snoise">0</span>mm</label>
                    <input type="range" min="0" max="100" value="0" data-noise="sonar_noise_mm">
                    <label>Outliers <span id="val-out">0</span>%</label>
                    <input type="range" min="0" max="20" value="0" data-noise="sonar_outlier_pct">
                    <label>IMU Drift <span id="val-drift">0</span>&deg;/s</label>
                    <input type="range" min="0" max="5" step="0.1" value="0" data-noise="imu_drift_dps">
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden gauge elements for JS compatibility -->
    <div style="display:none">
        <div id="pitch-fill" class="gauge-fill"></div>
        <div id="roll-fill" class="gauge-fill"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="dog3d.js"></script>
    <script src="app.js"></script>
</body>
</html>
