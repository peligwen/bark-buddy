<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bark-Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bark-Buddy</h1>
        <div id="status-bar">
            <span class="stat"><span class="stat-label">Mode</span> <span id="mode-val">remote</span></span>
            <span class="stat"><span class="stat-label">Bal</span> <span id="balance-val" class="off">OFF</span></span>
            <span class="stat"><span class="stat-label">Dist</span> <span id="ultra-val">--</span></span>
            <span class="stat"><span class="stat-label">Batt</span> <span id="battery-val">--</span></span>
            <span class="stat"><span class="stat-label">Pitch</span> <span id="pitch-val">0.0</span></span>
            <span class="stat"><span class="stat-label">Roll</span> <span id="roll-val">0.0</span></span>
        </div>
        <div id="header-right">
            <button id="btn-lock" class="header-btn">Take Control</button>
            <span id="lock-text"></span>
            <span id="conn-indicator" class="indicator disconnected"></span>
            <span id="conn-text">Disconnected</span>
        </div>
    </header>

    <div id="fall-alert" class="hidden">FALL DETECTED</div>

    <div id="main">
        <!-- Two square views side by side -->
        <div id="views">
            <div id="dog-view-section" class="view-panel">
                <div id="dog-3d-container"></div>
            </div>
            <div id="scan-section" class="view-panel">
                <div id="scan-progress" class="hidden">
                    <div class="progress-bar"><div id="scan-progress-fill" class="progress-fill"></div></div>
                    <span id="scan-progress-text">0%</span>
                </div>
                <canvas id="map-canvas" width="400" height="400"></canvas>
                <div id="map-info">
                    <span id="map-points">Points: 0</span>
                    <span id="map-scans">Scans: 0</span>
                </div>
            </div>
        </div>

        <!-- Controls below -->
        <div id="controls-bar">
            <div class="dpad">
                <button class="dpad-btn" id="btn-forward" data-dir="forward">&#9650;</button>
                <div class="dpad-row">
                    <button class="dpad-btn" id="btn-left" data-dir="left">&#9664;</button>
                    <button class="dpad-btn dpad-center" id="btn-stop" data-dir="stop">&#9632;</button>
                    <button class="dpad-btn" id="btn-right" data-dir="right">&#9654;</button>
                </div>
                <button class="dpad-btn" id="btn-backward" data-dir="backward">&#9660;</button>
            </div>

            <div class="action-grid">
                <button class="action-btn" data-action="stand">Stand</button>
                <button class="action-btn" id="btn-balance" data-action="balance-toggle">Balance: OFF</button>
                <button class="action-btn" data-action="wave">Wave</button>
                <button class="action-btn" data-action="sit">Sit</button>
                <button class="action-btn" data-action="lie">Lie Down</button>
            </div>

            <div class="action-grid">
                <button class="action-btn" id="btn-patrol-demo">Run Demo Patrol</button>
                <button class="action-btn" id="btn-patrol-stop" disabled>Stop Patrol</button>
                <button class="action-btn" id="btn-scan-start">Scan Area</button>
                <button class="action-btn" id="btn-scan-stop" disabled>Stop Scan</button>
                <button class="action-btn" id="btn-map-clear">Clear Map</button>
                <button class="action-btn" id="btn-reset">Reset</button>
            </div>
        </div>

        <!-- Hidden elements kept for JS compatibility -->
        <div id="patrol-status" class="hidden">
            <span id="patrol-pos"></span>
            <span id="patrol-wp"></span>
        </div>
    </div>

    <!-- Hidden gauge elements for JS compatibility -->
    <div style="display:none">
        <div id="pitch-fill" class="gauge-fill"></div>
        <div id="roll-fill" class="gauge-fill"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="dog3d.js"></script>
    <script src="app.js"></script>
</body>
</html>
