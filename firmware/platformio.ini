; PlatformIO config for Bark-Buddy firmware
; Target: ESP32 (Hiwonder MechDog controller)
; Adjust board if MechDog uses a different ESP32 variant

[env:mechdog]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7
build_flags =
    -std=gnu++17
    -DARDUINO_JSON_USE_DOUBLE=0
