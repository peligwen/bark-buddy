; PlatformIO config for Bark-Buddy custom firmware
; Target: ESP32-S3 (Hiwonder MechDog controller)

[env:mechdog]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7
build_flags =
    -std=gnu++17
    -DARDUINO_JSON_USE_DOUBLE=0
    -DPINS_VERIFIED=1
    -DWIFI_ENABLED=0
    -DWIFI_SSID=\"\"
    -DWIFI_PASS=\"\"
